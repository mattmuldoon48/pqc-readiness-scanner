# Mock production TLS edge configuration. Fake paths only.
server {
    listen 443 ssl;
    server_name payments.internal.example;

    ssl_certificate /etc/pki/prod/payments_rsa_certificate.pem;
    ssl_certificate_key /etc/pki/prod/payments_rsa_private_key.pem;
    ssl_ciphers "ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256";
    ssl_protocols TLSv1.2 TLSv1.3;
}
